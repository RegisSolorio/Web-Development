<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Grid Matemático</title>

<style>

/* Hace que padding y border no rompan el ancho matemático */
*{
box-sizing:border-box;
margin:0;
padding:0;
}

/* Contenedor principal */
.container{
display:flex;            
width:900px;
margin:40px auto;
border:3px solid black;
}

/* Columnas */
.column{
flex:1;                  
padding:20px;
border:2px solid gray;
margin:5px;
position:relative;        
background:#f4f4f4;
}

/* Tarjeta interna */
.card{
padding:20px;
border:2px solid black;
background:white;
}

/* Elemento superpuesto */
.badge{
position:absolute;
top:-10px;
right:-10px;
background:red;
color:white;
padding:5px 10px;
border-radius:5px;
font-size:12px;
}

</style>
</head>

<body>

<div class="container">

<div class="column">
<div class="badge">Nuevo</div>
<div class="card">
<h3>Columna 1</h3>
<p>Contenido de ejemplo.</p>
</div>
</div>

<div class="column">
<div class="badge">Info</div>
<div class="card">
<h3>Columna 2</h3>
<p>Contenido de ejemplo.</p>
</div>
</div>

<div class="column">
<div class="badge">Extra</div>
<div class="card">
<h3>Columna 3</h3>
<p>Contenido de ejemplo.</p>
</div>
</div>

</div>

</body>
</html>

</body>
</html>
