<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulario Validado</title>

<style>

/* Base */
body{
font-family:Arial, sans-serif;
background:#f4f4f4;
padding:20px;
}

/* Contenedor */
form{
max-width:400px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
}

/* Inputs */
input{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
border:2px solid #ccc;
border-radius:5px;
outline:none;
}

/* Estado válido */
input.valid{
border-color:green;
}

/* Estado inválido */
input.invalid{
border-color:red;
}

/* Mensajes de error */
.error{
color:red;
font-size:12px;
display:none;
margin-top:-10px;
margin-bottom:10px;
}

/* Botón */
button{
padding:10px;
width:100%;
background:black;
color:white;
border:none;
cursor:pointer;
}

/* Enfoque accesible */
input:focus, button:focus{
outline:3px solid blue;
}

</style>
</head>

<body>

<form id="formulario" novalidate>

<label for="nombre">Nombre</label>
<input type="text" id="nombre" required>
<div class="error" id="errorNombre">Solo letras y mínimo 3 caracteres</div>

<label for="email">Correo</label>
<input type="email" id="email" required>
<div class="error" id="errorEmail">Correo inválido</div>

<label for="password">Contraseña</label>
<input type="password" id="password" required>
<div class="error" id="errorPassword">
Debe tener mínimo 6 caracteres, una mayúscula y un número
</div>

<button type="submit">Enviar</button>

</form>

<script>

/* Expresiones regulares */
const regex = {
nombre: /^[A-Za-zÁÉÍÓÚáéíóúñÑ ]{3,}$/,
email: /^[^\s@]+@[^\s@]+\.[^\s@]+$/,
password: /^(?=.*[A-Z])(?=.*\d).{6,}$/
};

/* Referencias */
const form = document.getElementById("formulario");
const nombre = document.getElementById("nombre");
const email = document.getElementById("email");
const password = document.getElementById("password");

/* Validación individual */
function validarCampo(input, tipo, errorId){
let valor = input.value.trim(); // limpieza básica

if(regex[tipo].test(valor)){
input.classList.remove("invalid");
input.classList.add("valid");
document.getElementById(errorId).style.display = "none";
return true;
}else{
input.classList.remove("valid");
input.classList.add("invalid");
document.getElementById(errorId).style.display = "block";
return false;
}
}

/* Eventos en tiempo real */
nombre.addEventListener("input", () => validarCampo(nombre, "nombre", "errorNombre"));
email.addEventListener("input", () => validarCampo(email, "email", "errorEmail"));
password.addEventListener("input", () => validarCampo(password, "password", "errorPassword"));

/* Envío del formulario */
form.addEventListener("submit", function(e){
e.preventDefault();

let v1 = validarCampo(nombre, "nombre", "errorNombre");
let v2 = validarCampo(email, "email", "errorEmail");
let v3 = validarCampo(password, "password", "errorPassword");

if(v1 && v2 && v3){
alert("Formulario válido");

/* Limpieza final */
form.reset();
document.querySelectorAll("input").forEach(i => {
i.classList.remove("valid");
});
}
});

</script>

</body>
</html>
